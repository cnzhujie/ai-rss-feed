name: Generate RSS Feeds

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
  push:
    branches: [ main ]


jobs:
  generate-rss:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
      
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        pip install -r requirements.txt
        
    - name: Generate RSS feeds
      run: |
        python anthropic_rss.py
        python deeplearning_rss.py
        python huggingface_rss.py
        python github_trending_rss.py
        python github_ranking_ai_rss.py
      
    - name: Commit and push RSS feeds
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add rss/ github_trending_data/
        git diff --staged --quiet || (git commit -m "Update RSS feeds - $(date -u)" && git push "https://${{ secrets.ANTHROPIC_RSS_GH_TOKEN || github.token }}@github.com/${{ github.repository }}.git" HEAD:main)
